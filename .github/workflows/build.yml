name: Build FusionMMECSV EXE

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Build EXE
      run: |
        pyinstaller FusionMMECSV.spec --clean --noconfirm
    
    - name: Verify
      run: |
        if (Test-Path "dist/FusionMMECSV.exe") {
          Write-Host "SUCCESS - EXE created"
          Get-Item "dist/FusionMMECSV.exe"
        } else {
          Write-Host "ERROR - EXE not found"
          exit 1
        }
      shell: pwsh
    
    - name: Upload EXE
      uses: actions/upload-artifact@v4
      with:
        name: FusionMMECSV-Windows
        path: dist/FusionMMECSV.exe
        retention-days: 90
