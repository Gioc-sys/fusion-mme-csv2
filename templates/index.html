<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Fusion MME CSV</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <header>
        <div class="container">
            <h1>🔧 Fusion MME CSV</h1>
            <button onclick="quit()" class="btn-quit">Quitter</button>
        </div>
    </header>

    <main class="container">
        <div id="modeSelect" class="mode-select">
            <h2>Choisissez un mode</h2>
            <div class="modes">
                <button onclick="showMode('csv')" class="mode-btn">
                    <h3>Ajout de Voie MME/CSV</h3>
                    <p>Ajouter des voies CSV à un fichier MME</p>
                </button>
                <button onclick="showMode('merge')" class="mode-btn">
                    <h3>Fusion de MME</h3>
                    <p>Fusionner plusieurs fichiers MME</p>
                </button>
            </div>
        </div>

        <div id="csvMode" class="mode-content" style="display:none">
            <button onclick="back()" class="btn-back">← Retour</button>
            <h2>Ajout de Voie MME/CSV</h2>
            
            <div class="upload">
                <input type="file" id="mmeFile" accept=".zip,.7z">
                <label for="mmeFile">📦 Fichier MME</label>
                <div id="mmeName"></div>
            </div>
            
            <div class="upload">
                <input type="file" id="csvFile" accept=".csv">
                <label for="csvFile">📄 Fichier CSV</label>
                <div id="csvName"></div>
            </div>
            
            <button onclick="processCSV()" class="btn-process">Ajouter les Voies</button>
            <div id="csvResults"></div>
        </div>

        <div id="mergeMode" class="mode-content" style="display:none">
            <button onclick="back()" class="btn-back">← Retour</button>
            <h2>Fusion de MME</h2>
            
            <div class="upload">
                <input type="file" id="mmeFiles" accept=".zip,.7z" multiple>
                <label for="mmeFiles">📦 Fichiers MME (multiple)</label>
                <div id="mmesName"></div>
            </div>
            
            <button onclick="processMerge()" class="btn-process">Fusionner</button>
            <div id="mergeResults"></div>
        </div>

        <div id="loading" style="display:none">Traitement...</div>
    </main>

    <footer>
        <p>Made by R.Pichard</p>
    </footer>

    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
